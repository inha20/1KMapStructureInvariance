<svg xmlns="http://www.w3.org/2000/svg" width="480" height="460" viewBox="0 0 480 460" font-family="'Times New Roman', Times, serif">
  <!-- Background -->
  <rect width="480" height="460" fill="white"/>

  <!-- Title -->
  <text x="240" y="30" text-anchor="middle" font-size="14" font-weight="bold" fill="#111">4×4 카르노맵 좌표계 정의</text>

  <!-- Grid origin offset -->
  <!-- Grid starts at (80, 60), each cell is 80×80 -->

  <!-- Axis arrows -->
  <!-- Row axis: top-left going down -->
  <line x1="50" y1="60" x2="50" y2="380" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- Col axis: top-left going right -->
  <line x1="80" y1="40" x2="400" y2="40" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- Axis labels -->
  <text x="30" y="220" text-anchor="middle" font-size="13" fill="#333" transform="rotate(-90,30,220)">행 (Row)</text>
  <text x="240" y="25" text-anchor="middle" font-size="13" fill="#333">열 (Column)</text>

  <!-- Origin marker -->
  <circle cx="80" cy="60" r="5" fill="#111"/>
  <text x="62" y="56" text-anchor="end" font-size="11" fill="#111" font-style="italic">O</text>

  <!-- Grid cells (4×4) -->
  <!-- Row i, Col j: x = 80 + (j-1)*80, y = 60 + (i-1)*80 -->

  <!-- Draw grid lines -->
  <!-- Vertical lines: x = 80, 160, 240, 320, 400 -->
  <line x1="80"  y1="60" x2="80"  y2="380" stroke="#555" stroke-width="1.2"/>
  <line x1="160" y1="60" x2="160" y2="380" stroke="#555" stroke-width="1.2"/>
  <line x1="240" y1="60" x2="240" y2="380" stroke="#555" stroke-width="1.2"/>
  <line x1="320" y1="60" x2="320" y2="380" stroke="#555" stroke-width="1.2"/>
  <line x1="400" y1="60" x2="400" y2="380" stroke="#555" stroke-width="1.2"/>
  <!-- Horizontal lines: y = 60, 140, 220, 300, 380 -->
  <line x1="80" y1="60"  x2="400" y2="60"  stroke="#555" stroke-width="1.2"/>
  <line x1="80" y1="140" x2="400" y2="140" stroke="#555" stroke-width="1.2"/>
  <line x1="80" y1="220" x2="400" y2="220" stroke="#555" stroke-width="1.2"/>
  <line x1="80" y1="300" x2="400" y2="300" stroke="#555" stroke-width="1.2"/>
  <line x1="80" y1="380" x2="400" y2="380" stroke="#555" stroke-width="1.2"/>

  <!-- Cell coordinate labels (row, col) centered in each cell -->
  <!-- Row 1 -->
  <text x="120" y="106" text-anchor="middle" font-size="12" fill="#222">(1, 1)</text>
  <text x="200" y="106" text-anchor="middle" font-size="12" fill="#222">(1, 2)</text>
  <text x="280" y="106" text-anchor="middle" font-size="12" fill="#222">(1, 3)</text>
  <text x="360" y="106" text-anchor="middle" font-size="12" fill="#222">(1, 4)</text>
  <!-- Row 2 -->
  <text x="120" y="186" text-anchor="middle" font-size="12" fill="#222">(2, 1)</text>
  <text x="200" y="186" text-anchor="middle" font-size="12" fill="#222">(2, 2)</text>
  <text x="280" y="186" text-anchor="middle" font-size="12" fill="#222">(2, 3)</text>
  <text x="360" y="186" text-anchor="middle" font-size="12" fill="#222">(2, 4)</text>
  <!-- Row 3 -->
  <text x="120" y="266" text-anchor="middle" font-size="12" fill="#222">(3, 1)</text>
  <text x="200" y="266" text-anchor="middle" font-size="12" fill="#222">(3, 2)</text>
  <text x="280" y="266" text-anchor="middle" font-size="12" fill="#222">(3, 3)</text>
  <text x="360" y="266" text-anchor="middle" font-size="12" fill="#222">(3, 4)</text>
  <!-- Row 4 -->
  <text x="120" y="346" text-anchor="middle" font-size="12" fill="#222">(4, 1)</text>
  <text x="200" y="346" text-anchor="middle" font-size="12" fill="#222">(4, 2)</text>
  <text x="280" y="346" text-anchor="middle" font-size="12" fill="#222">(4, 3)</text>
  <text x="360" y="346" text-anchor="middle" font-size="12" fill="#222">(4, 4)</text>

  <!-- Row index labels on left axis -->
  <text x="68" y="104" text-anchor="end" font-size="13" fill="#111" font-weight="bold">1</text>
  <text x="68" y="184" text-anchor="end" font-size="13" fill="#111" font-weight="bold">2</text>
  <text x="68" y="264" text-anchor="end" font-size="13" fill="#111" font-weight="bold">3</text>
  <text x="68" y="344" text-anchor="end" font-size="13" fill="#111" font-weight="bold">4</text>

  <!-- Column index labels on top axis -->
  <text x="120" y="54" text-anchor="middle" font-size="13" fill="#111" font-weight="bold">1</text>
  <text x="200" y="54" text-anchor="middle" font-size="13" fill="#111" font-weight="bold">2</text>
  <text x="280" y="54" text-anchor="middle" font-size="13" fill="#111" font-weight="bold">3</text>
  <text x="360" y="54" text-anchor="middle" font-size="13" fill="#111" font-weight="bold">4</text>

  <!-- Direction arrows inside grid -->
  <!-- "행 증가 방향 ↓" label -->
  <text x="240" y="415" text-anchor="middle" font-size="12" fill="#555">← 열 번호 증가 방향 →</text>
  <text x="18" y="224" text-anchor="middle" font-size="12" fill="#555" transform="rotate(-90,18,224)">↓ 행 번호 증가 방향 ↓</text>

  <!-- Caption -->
  <text x="240" y="445" text-anchor="middle" font-size="11.5" fill="#444">그림 5.5.1: 카르노맵 좌표계 정의 — 각 셀은 (행, 열) 형태로 표기</text>
</svg>
